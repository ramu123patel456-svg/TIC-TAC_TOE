<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe Friend</title>

    <link rel="stylesheet" href="css/game.css">

</head>

<body>

<div class="container">

    <h1>Tic Tac Toe</h1>

    <p id="status">Player X Turn</p>

    <div id="board"></div>

    <div class="score-board">

        <div>
            X :
            <span id="scoreX">0</span>
        </div>

        <div>
            O :
            <span id="scoreO">0</span>
        </div>

    </div>

</div>

<script src="js/with-friend.js"></script>

</body>

</html>
